<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starlink Master Guide by Alexandru Bratosin</title>
    <style>
        :root {
            /* True Light Theme */
            --bg: #f8fafc;
            --surface: #ffffff;
            
            /* Enforced Black Text */
            --text-main: #000000;
            --text-muted: #000000;
            --tip-text: #000000;
            
            --accent: #0284c7; /* Starlink / Sky Blue */
            --border: #e2e8f0;
            --tip-bg: #f0f9ff;
            --tip-border: #0284c7;
            
            /* Light mode code elements */
            --code-bg: #f1f5f9;
            --code-text: #000000; 
            --code-border: #cbd5e1;
            
            --success: #059669;
            
            /* Enforced Black SVGs */
            --logo-color: #000000;
            --icon-color: #000000;
            
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.05), 0 4px 6px -4px rgb(0 0 0 / 0.02);
            --glow: 0 0 15px rgba(2, 132, 199, 0.15);
        }

        [data-theme="dark"] {
            /* Refined Dark Theme */
            --bg: #0b1120;
            --surface: #1e293b;
            
            /* Enforced White Text */
            --text-main: #ffffff;
            --text-muted: #ffffff;
            --tip-text: #ffffff;
            
            --accent: #38bdf8;
            --border: #334155;
            --tip-bg: #0f172a;
            --tip-border: #38bdf8;
            
            /* Dark mode code elements */
            --code-bg: #000000;
            --code-text: #4ade80; /* Classic terminal green */
            --code-border: #1e293b;
            
            --success: #10b981;
            
            /* Enforced White SVGs */
            --logo-color: #ffffff;
            --icon-color: #ffffff;
            
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.3);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.4), 0 2px 4px -2px rgb(0 0 0 / 0.4);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.5), 0 4px 6px -4px rgb(0 0 0 / 0.5);
            --glow: 0 0 15px rgba(56, 189, 248, 0.25);
        }

        * { 
            box-sizing: border-box; 
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease; 
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 2.5rem 1rem;
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
        }

        .container { max-width: 950px; margin: 0 auto; }

        /* Custom Tooltip Setup */
        @media (hover: hover) {
            [data-tooltip] {
                position: relative;
                cursor: help;
            }
            [data-tooltip]::after {
                content: attr(data-tooltip);
                position: absolute;
                bottom: calc(100% + 8px);
                left: 50%;
                transform: translateX(-50%) translateY(5px);
                background: var(--text-main);
                color: var(--bg);
                padding: 6px 12px;
                border-radius: 6px;
                font-size: 0.8rem;
                font-weight: 600;
                white-space: nowrap;
                opacity: 0;
                visibility: hidden;
                pointer-events: none;
                transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
                box-shadow: var(--shadow-lg);
                z-index: 100;
            }
            [data-tooltip]::before {
                content: "";
                position: absolute;
                bottom: calc(100% + 2px);
                left: 50%;
                transform: translateX(-50%) translateY(5px);
                border-width: 6px;
                border-style: solid;
                border-color: var(--text-main) transparent transparent transparent;
                opacity: 0;
                visibility: hidden;
                pointer-events: none;
                transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
                z-index: 100;
            }
            [data-tooltip]:hover::after,
            [data-tooltip]:hover::before {
                opacity: 1;
                visibility: visible;
                transform: translateX(-50%) translateY(0);
            }
            [data-tooltip-pos="bottom"]::after {
                bottom: auto; top: calc(100% + 8px);
            }
            [data-tooltip-pos="bottom"]::before {
                bottom: auto; top: calc(100% + 2px);
                border-color: transparent transparent var(--text-main) transparent;
            }
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            background: var(--surface);
            padding: 1rem 1.5rem;
            border-radius: 12px;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border);
        }

        .brand { display: flex; align-items: center; gap: 12px; }
        .brand-text h1 { margin: 0; font-size: 1.15rem; font-weight: 700; letter-spacing: -0.3px; }
        .brand-text .status { 
            color: var(--success); font-size: 0.8rem; font-weight: 600; 
            display: flex; align-items: center; gap: 6px; margin-top: 2px; width: max-content;
        }

        .controls { display: flex; gap: 0.75rem; }

        select, button {
            padding: 0.5rem 1rem; border-radius: 6px; border: 1px solid var(--border);
            background: var(--surface); color: var(--text-main); font-size: 0.85rem;
            cursor: pointer; font-weight: 600; outline: none; box-shadow: var(--shadow-sm);
        }
        button:hover, select:hover { border-color: var(--icon-color); transform: translateY(-1px); }

        /* Modern Architecture Diagram */
        .diagram-container {
            background: var(--surface);
            border-radius: 16px;
            padding: 2.5rem 2rem;
            margin-bottom: 3rem;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            text-align: center;
        }
        .diagram-title {
            font-size: 0.9rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: 1.5px; color: var(--text-muted); margin-bottom: 2rem;
        }
        .arch-flow {
            display: flex; justify-content: center; align-items: center; gap: 1rem;
        }
        .arch-node {
            background: var(--bg); border: 2px solid var(--border); border-radius: 12px;
            padding: 1.5rem; flex: 1; max-width: 220px; display: flex; flex-direction: column;
            align-items: center; gap: 12px; transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
        }
        .arch-node:hover {
            transform: translateY(-4px); border-color: var(--accent); box-shadow: var(--glow);
        }
        .arch-node svg {
            width: 48px; height: 48px; stroke: var(--text-main); fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round;
        }
        .arch-node .node-title {
            font-size: 0.95rem; font-weight: 700; color: var(--text-main);
        }
        .arch-connector {
            display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--text-muted);
        }
        .arch-connector svg {
            width: 40px; height: 16px; stroke: var(--text-muted); stroke-width: 2; fill: none;
        }

        .section-title {
            margin: 2rem 0 1.5rem 0; font-size: 0.95rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 2px; color: var(--text-muted);
            display: flex; align-items: center; gap: 12px;
        }
        .section-title::after { content: ""; flex: 1; height: 1px; background: var(--border); }

        .step-grid { display: flex; flex-direction: column; gap: 1.5rem; }
        .step-card {
            background: var(--surface); border-radius: 16px; padding: 2rem;
            box-shadow: var(--shadow-sm); border: 1px solid var(--border); display: grid;
            grid-template-columns: 60px 1fr; gap: 1.75rem; align-items: start;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .step-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }

        .step-visual-col { display: flex; flex-direction: column; align-items: center; gap: 16px; }
        .step-number {
            background: var(--text-main); color: var(--bg); width: 32px; height: 32px;
            border-radius: 8px; display: flex; justify-content: center; align-items: center;
            font-weight: 800; font-size: 1rem; cursor: default;
        }
        .step-icon { width: 40px; height: 40px; display: flex; justify-content: center; align-items: center; }
        .step-icon svg {
            width: 100%; height: 100%; stroke: var(--icon-color); fill: none;
            stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round;
        }

        .step-content h2 { margin: 0 0 0.5rem 0; font-size: 1.3rem; font-weight: 700; }
        .step-content p { margin: 0 0 1.5rem 0; color: var(--text-muted); font-size: 1.05rem; }

        .pro-tip {
            background: var(--tip-bg); color: var(--tip-text); padding: 1.5rem;
            border-radius: 12px; font-size: 0.95rem; border-left: 4px solid var(--tip-border);
        }
        .pro-tip strong { 
            display: flex; align-items: center; gap: 8px; margin-bottom: 1rem; 
            color: var(--text-main); font-family: -apple-system, BlinkMacSystemFont, sans-serif; text-transform: uppercase; 
            letter-spacing: 1px; font-size: 0.8rem; font-weight: 700;
        }

        .code-block {
            background-color: var(--code-bg); color: var(--code-text); padding: 1.25rem;
            border-radius: 8px; font-family: "SFMono-Regular", Consolas, monospace;
            font-size: 0.9rem; white-space: pre-wrap; margin: 0;
            border: 1px solid var(--code-border); line-height: 1.6; overflow-x: auto;
        }

        @media (max-width: 768px) {
            .toolbar { flex-direction: column; gap: 1rem; align-items: stretch; text-align: center; }
            .brand { justify-content: center; flex-direction: column; }
            .arch-flow { flex-direction: column; }
            .arch-connector svg { transform: rotate(90deg); height: 40px; width: 16px; margin: 8px 0; }
            .arch-node { max-width: 100%; width: 100%; }
            .step-card { grid-template-columns: 1fr; padding: 1.5rem; }
            .step-visual-col { flex-direction: row; justify-content: flex-start; gap: 12px; margin-bottom: 0.5rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="toolbar">

            <button onclick="toggleTheme()" id="theme-btn" data-tooltip="Toggle Dark/Light Mode" data-tooltip-pos="bottom">☀️ Light</button>
        </div>
    </div>

    <div class="diagram-container">
        <div class="diagram-title" id="diagram-title-text">Architecture Overview</div>
        
        <div class="arch-flow">
            <div class="arch-node" id="tt-node1" data-tooltip="Phased Array Antenna">
                <svg viewBox="0 0 24 24">
                    <path d="M12 21L12 14M9 21h6M3 9a9 9 0 0 1 18 0M3 9c0 3 4 5 9 5s9-2 9-5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <div class="node-title" id="lbl-node1">Starlink Dish</div>
            </div>
            
            <div class="arch-connector" id="tt-conn1" data-tooltip="Proprietary SPX Cable">
                <svg viewBox="0 0 40 16" preserveAspectRatio="none">
                    <path d="M0,8 L36,8" stroke-dasharray="4,4" /><path d="M32,3 L38,8 L32,13" />
                </svg>
            </div>
            
            <div class="arch-node" id="tt-node2" data-tooltip="Gen 2 / Gen 3 Hub">
                <svg viewBox="0 0 24 24">
                    <rect x="6" y="4" width="12" height="16" rx="2"/><circle cx="12" cy="16" r="1.5" fill="currentColor"/>
                </svg>
                <div class="node-title" id="lbl-node2">Starlink Router</div>
            </div>
            
            <div class="arch-connector" id="tt-conn2" data-tooltip="2.4GHz / 5GHz Connection">
                <svg viewBox="0 0 40 16" preserveAspectRatio="none">
                    <path d="M0,8 L36,8" stroke-dasharray="4,4" /><path d="M32,3 L38,8 L32,13" />
                </svg>
            </div>
            
            <div class="arch-node" id="tt-node3" data-tooltip="Phones, Laptops, IoT">
                <svg viewBox="0 0 24 24">
                    <rect x="3" y="4" width="18" height="12" rx="2"/><path d="M2 20h20M12 16v4"/>
                </svg>
                <div class="node-title" id="lbl-node3">Client Devices</div>
            </div>
        </div>
    </div>

    <div id="content-container"></div>
</div>

            advTitle: "Phase 4: Advanced Diagnostics & Pro Tips",
            hardware: [
                { icon: "survey", tooltip: "Setup Planning", title: "Site Survey & Obstruction Check", desc: "Starlink requires a completely unobstructed 110-degree field of view of the sky. Trees, buildings, or poles will interrupt the phased array tracking.", tip: "Use the Starlink App's AR scanner tool before permanently mounting. Stand exactly where the dish will go, at the exact height. A 1% obstruction can cause significant gaming and VoIP drops." },
                { icon: "assembly", tooltip: "Physical Setup", title: "Inventory & Assembly", desc: "Unbox the dish, base/mast, router, SPX cable, and AC power cable. Insert the mast into the base until it clicks. Plug the proprietary SPX connector into the dish.", tip: "Ensure the connector is perfectly flush. A loose connection at the dish side is the #1 cause of 'Dish Unreachable' errors. You should hear/feel a click." },

                { icon: "security", tooltip: "Lock Down", title: "App Configuration & Security", desc: "Open the Starlink App. It will immediately prompt you to configure your network. Enter a custom SSID (Network Name) and a secure WPA2/WPA3 password. Save the settings.", tip: "Once you save, your device will be disconnected from the default network. You must manually go back into your device's Wi-Fi settings and connect to your newly created secure network." },

                { icon: "survey", tooltip: "Aufbauplanung", title: "Standortanalyse & Hindernisse", desc: "Starlink benötigt ein absolut freies 110-Grad-Sichtfeld zum Himmel. Bäume, Gebäude oder Masten stören das Phased-Array-Tracking.", tip: "Nutzen Sie den AR-Scanner der App vor der endgültigen Montage. Selbst eine Blockade von 1% kann zu Verbindungsabbrüchen bei Spielen und VoIP-Anrufen führen." },
                { icon: "assembly", tooltip: "Physischer Aufbau", title: "Inventar & Montage", desc: "Entpacken Sie Antenne, Standfuß, Router, SPX-Kabel und Netzkabel. Stecken Sie den Mast in den Fuß. Verbinden Sie den proprietären SPX-Stecker mit der Antenne.", tip: "Der Stecker muss absolut bündig sitzen. Eine lockere Verbindung ist die häufigste Ursache für den Fehler 'Antenne nicht erreichbar'. Es muss spürbar einrasten." },
                { icon: "cable", tooltip: "Verkabelung", title: "Kabelverlegung & Tropfschlaufe", desc: "Verlegen Sie das Kabel von außen nach innen. Vermeiden Sie scharfe 90-Grad-Knicke, das Einklemmen in Fenstern oder die Befestigung mit harten Klammern.", tip: "Bilden Sie eine 'Tropfschlaufe' (ein U-förmiger Bogen), bevor das Kabel durch die Außenwand geführt wird. So tropft Regenwasser ab und fließt nicht ins Mauerwerk." },
                { icon: "router", tooltip: "Stromversorgung", title: "Router-Platzierung & Strom", desc: "Platzieren Sie den Router zentral und erhöht (mind. 1 Meter über dem Boden). Verbinden Sie das Antennenkabel mit dem Router und stecken Sie das Netzkabel ein.", tip: "Halten Sie den Router fern von dichten Materialien (Ziegel, Beton, Metall), Aquarien und Mikrowellen. Warten Sie bis zu 5 Minuten; motorisierte Antennen richten sich nun physisch aus." }
            ],
            software: [
                { icon: "wifi", tooltip: "Erste Kopplung", title: "Erster Netzwerkstart", desc: "Warten Sie, bis die Router-LED stabil leuchtet. Suchen Sie in den WLAN-Einstellungen Ihres Geräts nach einem offenen Netzwerk namens 'STARLINK' oder 'STINKY' und verbinden Sie sich.", tip: "Erscheint das Netzwerk nach 10 Minuten nicht, ziehen Sie den Netzstecker 6-mal schnell hintereinander heraus und stecken ihn wieder ein, um einen Werksreset durchzuführen." },
                { icon: "security", tooltip: "Absicherung", title: "App-Konfiguration & Sicherheit", desc: "Öffnen Sie die Starlink-App. Sie werden sofort aufgefordert, Ihr Netzwerk einzurichten. Vergeben Sie eine eigene SSID (Netzwerkname) und ein sicheres Passwort. Speichern Sie ab.", tip: "Nach dem Speichern wird Ihr Gerät vom Standardnetzwerk getrennt. Sie müssen nun manuell in Ihre WLAN-Einstellungen gehen und sich mit Ihrem neuen, sicheren Netzwerk verbinden." },
                { icon: "split", tooltip: "Frequenzbänder", title: "Erweiterte Netzwerktrennung", desc: "Standardmäßig kombiniert Starlink das 2,4-GHz- und 5-GHz-Band. Gehen Sie in der App zu 'Einstellungen > Netzwerk' für erweiterte Optionen.", tip: "Aktivieren Sie '2,4 / 5 GHz Netzwerke trennen'. Dies wird dringend für Smart-Home-Geräte (IoT, Kameras) empfohlen, da diese bei kombinierten Bändern oft Verbindungsprobleme haben." },
                { icon: "bypass", tooltip: "Bridge-Modus", title: "Bypass-Modus (Drittanbieter-Router)", desc: "Wenn Sie ein eigenes Mesh-System (z. B. Ubiquiti, Eero) verwenden, müssen Sie die integrierte WLAN-Routing-Funktion von Starlink deaktivieren.", tip: "Aktivieren Sie in der App den 'Bypass-Modus'. Hinweis: Sie benötigen den Starlink-Ethernet-Adapter (separat erhältlich für Standardmodelle), um Ihren eigenen Router anzuschließen." }
            ],
            troubleshooting: [
                { icon: "disconnected", tooltip: "Offline Fehler", title: "App zeigt 'Getrennt' oder 'Starlink nicht erreichbar'", desc: "Der Router kann nicht mit der Antenne kommunizieren. Dies ist fast immer ein physisches Kabelproblem.", tip: "Überprüfen Sie den Stecker an der Antenne. Er erfordert etwas Kraft, um richtig einzurasten. Achten Sie auf Schmutz im Stecker, bevor Sie ihn wieder einstecken." },
                { icon: "slow", tooltip: "Geschwindigkeit", title: "Langsame Geschwindigkeiten oder Abbrüche", desc: "Mikro-Abbrüche werden meist durch winzige Hindernisse verursacht, während generelle Langsamkeit an der Router-Platzierung oder der initialen Netzwerk-Kartierung liegen kann.", tip: "Geben Sie dem System 12-24 Stunden Zeit, um die neueste Firmware herunterzuladen und die Satellitenkonstellationen zu kartieren. Verstecken Sie den Router nicht in einem geschlossenen Schrank." },
                { icon: "reset", tooltip: "Neustart", title: "Router-LED leuchtet rot oder reagiert nicht", desc: "Ein rotes Licht signalisiert einen Startfehler oder fehlendes Internet. Kein Licht deutet auf ein Stromproblem hin.", tip: "Führen Sie einen Hard-Reset durch, indem Sie das Stromkabel 6-mal schnell hintereinander aus- und einstecken. Warten Sie 5 Minuten, bis das Standard-WLAN 'STARLINK' wieder erscheint." }
            ],

                { icon: "shield", tooltip: "Witterungsschutz", title: "Meisterhafter Wetterschutz", desc: "Eindringende Feuchtigkeit ist die Hauptursache für Hardwareausfälle. Behandeln Sie Außenanschlüsse mit äußerster Sorgfalt.", tip: "Bohren Sie Löcher in Außenwände von innen nach außen leicht abwärts, damit Wasser nicht nach innen fließen kann. Tragen Sie eine winzige Menge dielektrisches Silikonfett auf die Kunststoffkanten der Außenstecker auf, um Oxidation zu verhindern." },
                { icon: "ruler", tooltip: "Spannung", title: "Hardware-Grenzen & Kabellängen", desc: "Verschiedene Starlink-Generationen haben unterschiedliche physikalische Toleranzen und Stromanforderungen.", tip: "Gen 3 Standard-Antennen nutzen RJ45-Kabel, ziehen aber bis zu 180W. Verlängern Sie das Kabel nie mit Drittanbieter-Kupplungen über 50m hinaus, sonst drohen Spannungsabfälle und Verbindungsabbrüche. Richten Sie motorisierte Gen 2 Antennen niemals mit physischer Gewalt manuell aus." },

                { icon: "power", tooltip: "Temperaturen", title: "Strom- & Schneeschmelz-Management", desc: "Die Starlink-Antenne erzeugt absichtlich Wärme, um Schnee und Eis zu schmelzen. Dies verbraucht massiv Strom.", tip: "Wenn Sie Ihr System über eine Batteriebank oder Solaranlage betreiben oder in einem warmen Klima leben, stellen Sie die 'Schneeschmelze' in der App von 'Automatisch' auf 'Aus', um erheblich Energie zu sparen." }
            ]
        }
    };

    let isDark = true;

    function renderSection(title, steps, startIndex) {
        let html = `<h3 class="section-title">${title}</h3><div class="step-grid">`;
        steps.forEach((step, index) => {
            html += `
                <div class="step-card">
                    <div class="step-visual-col">
                        <div class="step-number" data-tooltip="${step.tooltip}">${startIndex + index}</div>
                        <div class="step-icon">${svgs[step.icon]}</div>
                    </div>
                    <div class="step-content">
                        <h2>${step.title}</h2>
                        <p>${step.desc}</p>
                        <div class="pro-tip">
                            <strong>
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
                                Pro Tip
                            </strong>
                            <div class="code-block">${step.tip}</div>
                        </div>
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        return html;
    }

    function renderUI() {
        const lang = document.getElementById('lang-selector').value;
        const data = content[lang];
        
        // Update Static Headers
        document.getElementById('app-title').textContent = data.title;
        document.getElementById('app-status').textContent = data.status;
        document.getElementById('status-badge').setAttribute('data-tooltip', data.statusTooltip);
        document.getElementById('diagram-title-text').textContent = data.diagramTitle;
        
        // Update Diagram Tooltips
        document.getElementById('tt-node1').setAttribute('data-tooltip', data.tooltips.node1);
        document.getElementById('tt-node2').setAttribute('data-tooltip', data.tooltips.node2);
        document.getElementById('tt-node3').setAttribute('data-tooltip', data.tooltips.node3);
        document.getElementById('tt-conn1').setAttribute('data-tooltip', data.tooltips.conn1);
        document.getElementById('tt-conn2').setAttribute('data-tooltip', data.tooltips.conn2);
        
        // Update Theme Button
        const themeBtn = document.getElementById('theme-btn');
        themeBtn.textContent = isDark ? data.themeLight : data.themeDark;
        
        // Render all 4 phases
        const container = document.getElementById('content-container');
        const hwCount = data.hardware.length;
        const swCount = data.software.length;
        const tsCount = data.troubleshooting.length;
        const advCount = data.advanced.length;
        
        container.innerHTML = 
            renderSection(data.hwTitle, data.hardware, 1) + 
            renderSection(data.swTitle, data.software, hwCount + 1) +
            renderSection(data.tsTitle, data.troubleshooting, hwCount + swCount + 1) +
            renderSection(data.advTitle, data.advanced, hwCount + swCount + tsCount + 1);
    }

    function toggleTheme() {
        isDark = !isDark;
        document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
        renderUI(); 
    }

    // Initialize on load
    window.onload = renderUI;
</script>

</body>
</html>
